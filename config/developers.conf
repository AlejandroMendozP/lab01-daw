<VirtualHost *:80>
    ServerName developers.local
    ServerAlias developers
    DocumentRoot /var/www/developers

    <Directory /var/www/developers>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/developers_error.log
    CustomLog ${APACHE_LOG_DIR}/developers_access.log combined
</VirtualHost>